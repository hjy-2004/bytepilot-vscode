name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release-vscode:
    name: Release VS Code Extension
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Build core
        run: npm run build:core
      - name: Build extension
        run: node esbuild.config.mjs
      - name: Build webview (VS Code theme)
        run: cd webview-ui && npm ci && npm run build
      - name: Package VSIX
        run: npx vsce package --no-dependencies
      - name: Upload VSIX
        uses: softprops/action-gh-release@v2
        with:
          files: '*.vsix'
          generate_release_notes: true

  release-desktop:
    name: Release Desktop (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x64
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            name: windows-x64
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            name: macos-arm64
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - name: Install webview UI dependencies
        run: cd webview-ui && npm ci
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Build Tauri app
        run: cd packages/tauri-app && npm ci && npx tauri build --target ${{ matrix.target }}
      - name: List bundle output
        run: find packages/tauri-app/src-tauri/target -name "*.exe" -o -name "*.msi" -o -name "*.dmg" -o -name "*.deb" -o -name "*.AppImage" 2>/dev/null || true
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: packages/tauri-app/src-tauri/target/${{ matrix.target }}/release/bundle/*/*
          generate_release_notes: true
