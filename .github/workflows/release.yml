name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release-vscode:
    name: Release VS Code Extension
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Build core
        run: npm run build:core
      - name: Build extension
        run: node esbuild.config.mjs
      - name: Build webview (VS Code theme)
        run: cd webview-ui && npm ci && npm run build
      - name: Package VSIX
        run: npx vsce package --no-dependencies
      - name: Upload VSIX
        uses: softprops/action-gh-release@v2
        with:
          files: '*.vsix'
          generate_release_notes: true

  release-desktop:
    name: Release Desktop (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            name: windows-x86_64
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            name: darwin-aarch64
            target: aarch64-apple-darwin
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - name: Install webview UI dependencies
        run: cd webview-ui && npm ci
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Build Tauri app
        run: cd packages/tauri-app && npm ci && npx tauri build --target ${{ matrix.target }}
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: packages/tauri-app/src-tauri/target/${{ matrix.target }}/release/bundle/*/*
          generate_release_notes: true
      - name: Upload signature & bundle for latest.json
        uses: actions/upload-artifact@v4
        with:
          name: updater-${{ matrix.name }}
          path: |
            packages/tauri-app/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.sig
            packages/tauri-app/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            packages/tauri-app/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            packages/tauri-app/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            packages/tauri-app/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb

  generate-latest-json:
    name: Generate updater manifest
    runs-on: ubuntu-latest
    needs: [release-desktop]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: updater-*
          merge-multiple: true
          path: ./updater-bundles

      - name: List downloaded files
        run: find ./updater-bundles -type f

      - name: Generate latest.json
        id: manifest
        run: |
          set -e
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"

          # Read release notes from the GitHub release (generated by softprops)
          NOTES="Release ${VERSION}"

          # Helper: find signature file and bundle URL for a platform
          find_sig() {
            local pattern="$1"
            local sig_file=$(find ./updater-bundles -name "${pattern}" | head -1)
            if [ -n "$sig_file" ]; then
              cat "$sig_file"
            else
              echo ""
            fi
          }
          find_url() {
            local pattern="$1"
            local file=$(find ./updater-bundles -name "${pattern}" -not -name "*.sig" | head -1)
            if [ -n "$file" ]; then
              local filename=$(basename "$file")
              echo "https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${filename}"
            else
              echo ""
            fi
          }

          # Platform: darwin-aarch64
          DARWIN_SIG=$(find_sig "*.dmg.sig")
          DARWIN_URL=$(find_url "*.dmg")

          # Platform: windows-x86_64
          WINDOWS_SIG=$(find_sig "*.msi.sig")
          WINDOWS_URL=$(find_url "*.msi")

          # Platform: linux-x86_64
          LINUX_SIG=$(find_sig "*.AppImage.sig")
          LINUX_URL=$(find_url "*.AppImage")

          # Try .deb for Linux if no AppImage
          if [ -z "$LINUX_URL" ]; then
            LINUX_SIG=$(find_sig "*.deb.sig")
            LINUX_URL=$(find_url "*.deb")
          fi

          # Build JSON
          jq -n \
            --arg version "$VERSION" \
            --arg notes "$NOTES" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg darwin_sig "$DARWIN_SIG" \
            --arg darwin_url "$DARWIN_URL" \
            --arg windows_sig "$WINDOWS_SIG" \
            --arg windows_url "$WINDOWS_URL" \
            --arg linux_sig "$LINUX_SIG" \
            --arg linux_url "$LINUX_URL" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: (
                (if $darwin_url != "" then {"darwin-aarch64": {signature: $darwin_sig, url: $darwin_url}} else {} end) +
                (if $windows_url != "" then {"windows-x86_64": {signature: $windows_sig, url: $windows_url}} else {} end) +
                (if $linux_url != "" then {"linux-x86_64": {signature: $linux_sig, url: $linux_url}} else {} end)
              )
            }' > latest.json

          echo "Generated latest.json:"
          cat latest.json

      - name: Upload latest.json to release
        uses: softprops/action-gh-release@v2
        with:
          files: latest.json
