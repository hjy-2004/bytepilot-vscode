name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx turbo run typecheck --filter=!@bytepilot/tauri-app

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx turbo run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx turbo run test

  build:
    name: Build & Package (VS Code)
    runs-on: ubuntu-latest
    needs: [typecheck, lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Build core + extension
        run: |
          cd packages/core && npm run build
          cd ../..
          node esbuild.config.mjs
          cd webview-ui && npm ci && npm run build
      - name: Package VSIX
        run: npx vsce package
      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: bytepilot-vsix
          path: '*.vsix'

  build-desktop:
    name: Build Desktop (Tauri)
    runs-on: ${{ matrix.os }}
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - name: Install webview UI dependencies
        run: cd webview-ui && npm ci
      - name: Build Tauri app
        run: cd packages/tauri-app && npm ci && npx tauri build --target ${{ matrix.target }}
      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: bytepilot-desktop-${{ matrix.os }}
          path: packages/tauri-app/src-tauri/target/${{ matrix.target }}/release/bundle/
